name: CI/CD Pipeline

on:
  push:
    branches:
    - main

env:
  IMAGE_NAME: small-app

jobs:
  # ── CI: Build & Push Docker image to DockerHub ──────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest .

    - name: Push image to DockerHub
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  # ── CD: Trigger Render to pull new image & redeploy ─────────────────────
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: build # only runs if build job succeeds

    steps:
    - name: Trigger Render Deploy Hook
      run: |
        curl -s --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
        echo "✅ Deploy triggered on Render"
