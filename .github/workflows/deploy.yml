name: Node CI

on:
  push:
    branches:
    - main

env:
  IMAGE_NAME: small-app

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Docker Login
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Create docker image
      run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/small-app:latest .

    - name: Push image to dockerhub
      run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/small-app:latest

    - name: Install Node
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm install
